AWSTemplateFormatVersion: "2010-09-09"
Description: Private REST API Gateway for manually dispatching the Athena incident report Lambda.

Parameters:
  AppName:
    Type: String
    Default: athena-incident-report
    AllowedPattern: "^[a-zA-Z][a-zA-Z0-9-]{2,48}$"
  EnvironmentName:
    Type: String
    Default: manual
    AllowedPattern: "^[a-zA-Z0-9-]{2,32}$"
  SourceCodeS3Bucket:
    Type: String
    Description: Existing S3 bucket containing the Lambda source zip.
  SourceCodeS3Key:
    Type: String
    Description: S3 key for the Lambda source zip.
  DependenciesLayerS3Bucket:
    Type: String
    Description: Existing S3 bucket containing the Lambda dependencies layer zip.
  DependenciesLayerS3Key:
    Type: String
    Description: S3 key for the Lambda dependencies layer zip.
  LambdaRuntime:
    Type: String
    Default: python3.12
    AllowedValues: [python3.12, python3.13]
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC reachable from the AWS Client VPN.
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: One or more existing private subnets for execute-api endpoint ENIs.
  ClientVpnCidr:
    Type: String
    Description: Source CIDR allowed to connect to the execute-api VPC endpoint.
    AllowedPattern: "^(([0-9]{1,3}\\.){3}[0-9]{1,3})/[0-9]{1,2}$"
  ApiStageName:
    Type: String
    Default: manual
    AllowedPattern: "^[a-zA-Z0-9_-]{1,32}$"
  LambdaMemorySize:
    Type: Number
    Default: 1024
    MinValue: 128
    MaxValue: 10240
  LambdaTimeoutSeconds:
    Type: Number
    Default: 900
    MinValue: 30
    MaxValue: 900
  ReservedConcurrentExecutions:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10
  LogRetentionDays:
    Type: Number
    Default: 30
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1096, 1827, 2192, 2557, 2922, 3288, 3653]

Resources:
  ApiEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${AppName}-${EnvironmentName} private API access from Client VPN"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref ClientVpnCidr
          Description: Client VPN HTTPS access to the private report API
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-${EnvironmentName}-private-api-sg"
        - Key: Application
          Value: !Ref AppName

  ExecuteApiVpcEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcEndpointType: Interface
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.execute-api"
      VpcId: !Ref VpcId
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds:
        - !Ref ApiEndpointSecurityGroup
      PrivateDnsEnabled: true
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-${EnvironmentName}-execute-api"
        - Key: Application
          Value: !Ref AppName

  ReportExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: write-cloudwatch-logs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AppName}-${EnvironmentName}:*"
        - PolicyName: read-tenant-report-config-secrets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:athena-incident-report/*/config-*"
      Tags:
        - Key: Application
          Value: !Ref AppName

  ReportLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-${EnvironmentName}"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Application
          Value: !Ref AppName

  ReportDependenciesLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub "${AppName}-${EnvironmentName}-dependencies"
      Description: Python dependencies for the Athena incident report Lambda.
      Content:
        S3Bucket: !Ref DependenciesLayerS3Bucket
        S3Key: !Ref DependenciesLayerS3Key
      CompatibleArchitectures:
        - x86_64
      CompatibleRuntimes:
        - !Ref LambdaRuntime

  ReportFunction:
    Type: AWS::Lambda::Function
    DependsOn: ReportLogGroup
    Properties:
      FunctionName: !Sub "${AppName}-${EnvironmentName}"
      Code:
        S3Bucket: !Ref SourceCodeS3Bucket
        S3Key: !Ref SourceCodeS3Key
      Role: !GetAtt ReportExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      Handler: lambda_handler.handler
      MemorySize: !Ref LambdaMemorySize
      Timeout: !Ref LambdaTimeoutSeconds
      ReservedConcurrentExecutions: !Ref ReservedConcurrentExecutions
      Architectures:
        - x86_64
      Layers:
        - !Ref ReportDependenciesLayer
      Environment:
        Variables:
          REPORT_ALLOW_GET: "false"
          REPORT_LAMBDA_SEND_EMAIL: "true"
      Tags:
        - Key: Application
          Value: !Ref AppName

  DispatcherExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: dispatch-report
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${AppName}-${EnvironmentName}-trigger:*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:athena-incident-report/*/config-*"
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt ReportFunction.Arn
      Tags:
        - Key: Application
          Value: !Ref AppName

  DispatcherLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${AppName}-${EnvironmentName}-trigger"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Application
          Value: !Ref AppName

  DispatcherFunction:
    Type: AWS::Lambda::Function
    DependsOn: DispatcherLogGroup
    Properties:
      FunctionName: !Sub "${AppName}-${EnvironmentName}-trigger"
      Code:
        S3Bucket: !Ref SourceCodeS3Bucket
        S3Key: !Ref SourceCodeS3Key
      Role: !GetAtt DispatcherExecutionRole.Arn
      Runtime: !Ref LambdaRuntime
      Handler: lambda_handler.dispatch_handler
      MemorySize: 256
      Timeout: 15
      Architectures:
        - x86_64
      Environment:
        Variables:
          REPORT_WORKER_FUNCTION_NAME: !Ref ReportFunction
      Tags:
        - Key: Application
          Value: !Ref AppName

  ReportApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${AppName}-${EnvironmentName}-private"
      Description: Private manual trigger for the Athena incident report.
      EndpointConfiguration:
        Types:
          - PRIVATE
        VpcEndpointIds:
          - !Ref ExecuteApiVpcEndpoint
      Policy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: execute-api:Invoke
            Resource: "execute-api:/*"
          - Effect: Deny
            Principal: "*"
            Action: execute-api:Invoke
            Resource: "execute-api:/*"
            Condition:
              StringNotEquals:
                aws:SourceVpce: !Ref ExecuteApiVpcEndpoint
      Tags:
        - Key: Application
          Value: !Ref AppName

  RunResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ReportApi
      ParentId: !GetAtt ReportApi.RootResourceId
      PathPart: run

  HealthResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ReportApi
      ParentId: !GetAtt ReportApi.RootResourceId
      PathPart: health

  RunPostMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ReportApi
      ResourceId: !Ref RunResource
      HttpMethod: POST
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        TimeoutInMillis: 29000
        Uri: !Sub "arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DispatcherFunction.Arn}/invocations"

  HealthGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ReportApi
      ResourceId: !Ref HealthResource
      HttpMethod: GET
      AuthorizationType: NONE
      MethodResponses:
        - StatusCode: "200"
          ResponseModels:
            application/json: Empty
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode":200}'
        IntegrationResponses:
          - StatusCode: "200"
            ResponseTemplates:
              application/json: '{"ok":true,"service":"athena-incident-report"}'

  ReportApiInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt DispatcherFunction.Arn
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:${AWS::Partition}:execute-api:${AWS::Region}:${AWS::AccountId}:${ReportApi}/*/POST/run"

  ReportApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - RunPostMethod
      - HealthGetMethod
    Properties:
      RestApiId: !Ref ReportApi
      Description: !Sub "Private report API deployment for ${SourceCodeS3Key}"

  ReportApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref ReportApi
      DeploymentId: !Ref ReportApiDeployment
      StageName: !Ref ApiStageName
      Tags:
        - Key: Application
          Value: !Ref AppName

Outputs:
  PrivateApiUrl:
    Description: HTTPS base URL, reachable only through the VPC endpoint/VPN path.
    Value: !Sub "https://${ReportApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${ApiStageName}"
  RunUrl:
    Description: Manual asynchronous report trigger URL.
    Value: !Sub "https://${ReportApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${ApiStageName}/run"
  HealthUrl:
    Description: API Gateway mock health URL; it does not invoke Lambda.
    Value: !Sub "https://${ReportApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${ApiStageName}/health"
  RestApiId:
    Value: !Ref ReportApi
  ExecuteApiVpcEndpointId:
    Value: !Ref ExecuteApiVpcEndpoint
  ApiEndpointSecurityGroupId:
    Value: !Ref ApiEndpointSecurityGroup
  DispatcherFunctionName:
    Value: !Ref DispatcherFunction
  LambdaFunctionName:
    Value: !Ref ReportFunction
  LambdaFunctionArn:
    Value: !GetAtt ReportFunction.Arn
